{{- if .Values.global.ingress.enabled }}
{{- $annotations := dict -}}
{{- range $key, $value := .Values.global.ingress.annotations }}
{{- $_ := set $annotations $key $value -}}
{{- end }}
{{- range $key, $value := .Values.global.deploymentFabric.geoRestrictions.ingressAnnotations }}
{{- $_ := set $annotations $key $value -}}
{{- end }}
{{- $allowedIngressCidrs := .Values.global.deploymentFabric.geoRestrictions.allowedIngressCidrs | default (list) -}}
{{- if and (gt (len $allowedIngressCidrs) 0) (not (hasKey $annotations "nginx.ingress.kubernetes.io/whitelist-source-range")) }}
{{- $_ := set $annotations "nginx.ingress.kubernetes.io/whitelist-source-range" (join "," $allowedIngressCidrs) -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "open-foundry.fullname" (dict "root" . "serviceName" "gateway") }}
  namespace: {{ include "open-foundry.namespace" (dict "root" .) }}
  labels:
{{ include "open-foundry.commonLabels" (dict "root" . "serviceName" "gateway") | nindent 4 }}
{{- if gt (len $annotations) 0 }}
  annotations:
{{ toYaml $annotations | indent 4 }}
{{- end }}
spec:
{{- if .Values.global.ingress.className }}
  ingressClassName: {{ .Values.global.ingress.className }}
{{- end }}
{{- with .Values.global.ingress.tls }}
  tls:
{{ toYaml . | indent 4 }}
{{- end }}
  rules:
{{- range .Values.global.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
{{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "open-foundry.fullname" (dict "root" $ "serviceName" "gateway") }}
                port:
                  number: {{ (index $.Values.services "gateway").port }}
{{- end }}
{{- end }}
{{- end }}
