{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-foundry.fullname" (dict "root" $ "serviceName" $serviceName) }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $serviceName }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ $serviceName }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: http
---
{{- end }}
{{- end }}