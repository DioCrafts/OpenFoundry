{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-foundry.fullname" (dict "root" $ "serviceName" $serviceName) }}
  namespace: {{ include "open-foundry.namespace" (dict "root" $) }}
  labels:
{{ include "open-foundry.commonLabels" (dict "root" $ "serviceName" $serviceName) | nindent 4 }}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
{{ include "open-foundry.selectorLabels" (dict "root" $ "serviceName" $serviceName) | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "open-foundry.commonLabels" (dict "root" $ "serviceName" $serviceName) | nindent 8 }}
{{- $hasAnnotations := or (gt (len $.Values.global.podAnnotations) 0) (gt (len ($service.podAnnotations | default dict)) 0) }}
{{- if $hasAnnotations }}
      annotations:
{{- range $annotationKey, $annotationValue := $.Values.global.podAnnotations }}
        {{ $annotationKey }}: {{ $annotationValue | quote }}
{{- end }}
{{- range $annotationKey, $annotationValue := ($service.podAnnotations | default dict) }}
        {{ $annotationKey }}: {{ $annotationValue | quote }}
{{- end }}
{{- end }}
    spec:
      serviceAccountName: {{ include "open-foundry.serviceAccountName" (dict "root" $) }}
      terminationGracePeriodSeconds: {{ default $.Values.global.terminationGracePeriodSeconds $service.terminationGracePeriodSeconds }}
      securityContext:
{{ toYaml (default $.Values.global.podSecurityContext $service.podSecurityContext) | indent 8 }}
{{- if $.Values.global.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $.Values.global.topologySpreadConstraints.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ $.Values.global.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
{{ include "open-foundry.selectorLabels" (dict "root" $ "serviceName" $serviceName) | nindent 14 }}
{{- end }}
{{- with $service.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with $service.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with $service.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: {{ $serviceName }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
{{- if $.Values.global.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ $.Values.global.existingSecret }}
{{- end }}
          env:
{{- range $envKey, $envValue := $service.env }}
            - name: {{ $envKey }}
              value: {{ $envValue | quote }}
{{- end }}
{{- if eq $serviceName "auth-service" }}
            - name: PUBLIC_WEB_ORIGIN
              value: {{ $.Values.global.publicWebOrigin | quote }}
{{- end }}
{{- if eq $serviceName "gateway" }}
            - name: AUTH_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "auth-service" "port" 50051) | quote }}
            - name: DATASET_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "dataset-service" "port" 50053) | quote }}
            - name: QUERY_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "query-service" "port" 50055) | quote }}
            - name: PIPELINE_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "pipeline-service" "port" 50056) | quote }}
            - name: REPORT_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "report-service" "port" 50064) | quote }}
            - name: GEOSPATIAL_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "geospatial-service" "port" 50068) | quote }}
            - name: NEXUS_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "nexus-service" "port" 50067) | quote }}
{{- end }}
{{- if eq $serviceName "pipeline-service" }}
            - name: DATASET_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "dataset-service" "port" 50053) | quote }}
{{- end }}
{{- if eq $serviceName "report-service" }}
            - name: DATASET_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "dataset-service" "port" 50053) | quote }}
            - name: GEOSPATIAL_SERVICE_URL
              value: {{ include "open-foundry.serviceUrl" (dict "root" $ "serviceName" "geospatial-service" "port" 50068) | quote }}
{{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
{{ toYaml (default $.Values.global.containerSecurityContext $service.containerSecurityContext) | indent 12 }}
{{- if $.Values.global.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ $.Values.global.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ $.Values.global.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.global.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $.Values.global.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $.Values.global.probes.readiness.failureThreshold }}
{{- end }}
{{- if $.Values.global.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ $.Values.global.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ $.Values.global.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.global.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $.Values.global.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $.Values.global.probes.liveness.failureThreshold }}
{{- end }}
          resources:
{{ toYaml $service.resources | indent 12 }}
---
{{- end }}
{{- end }}
