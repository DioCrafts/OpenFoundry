{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-foundry.fullname" (dict "root" $ "serviceName" $serviceName) }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $serviceName }}
    app.kubernetes.io/component: {{ $serviceName }}
{{- range $labelKey, $labelValue := $.Values.global.labels }}
    {{ $labelKey }}: {{ $labelValue | quote }}
{{- end }}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $serviceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $serviceName }}
        app.kubernetes.io/component: {{ $serviceName }}
{{- range $labelKey, $labelValue := $.Values.global.labels }}
        {{ $labelKey }}: {{ $labelValue | quote }}
{{- end }}
      annotations:
{{- range $annotationKey, $annotationValue := $.Values.global.podAnnotations }}
        {{ $annotationKey }}: {{ $annotationValue | quote }}
{{- end }}
    spec:
      containers:
        - name: {{ $serviceName }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
          env:
{{- range $envKey, $envValue := $service.env }}
            - name: {{ $envKey }}
              value: {{ $envValue | quote }}
{{- end }}
          resources:
{{ toYaml $service.resources | indent 12 }}
---
{{- end }}
{{- end }}