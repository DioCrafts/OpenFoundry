services:
	gateway:
		autoscaling:
			minReplicas: 3
			maxReplicas: 12
	query-service:
		env:
			DISTRIBUTED_QUERY_WORKERS: "8"
		autoscaling:
			minReplicas: 4
			maxReplicas: 20
			keda:
				enabled: true
	pipeline-service:
		env:
			DISTRIBUTED_PIPELINE_WORKERS: "8"
		autoscaling:
			minReplicas: 3
			maxReplicas: 16
			keda:
				enabled: true
	geospatial-service:
		autoscaling:
			minReplicas: 3
			maxReplicas: 10
