syntax = "proto3";
package open_foundry.dataset;

import "common/types.proto";
import "google/protobuf/timestamp.proto";
import "dataset/schema.proto";

service DatasetService {
  rpc CreateDataset(CreateDatasetRequest) returns (Dataset);
  rpc GetDataset(GetDatasetRequest) returns (Dataset);
  rpc ListDatasets(ListDatasetsRequest) returns (ListDatasetsResponse);
  rpc UpdateDataset(UpdateDatasetRequest) returns (Dataset);
  rpc DeleteDataset(DeleteDatasetRequest) returns (DeleteDatasetResponse);
  rpc PreviewData(PreviewDataRequest) returns (PreviewDataResponse);
  rpc GetVersions(GetVersionsRequest) returns (GetVersionsResponse);
}

message Dataset {
  open_foundry.common.Uuid id = 1;
  string name = 2;
  string description = 3;
  DatasetFormat format = 4;
  string storage_path = 5;
  int64 size_bytes = 6;
  int64 row_count = 7;
  Schema schema = 8;
  open_foundry.common.Uuid owner_id = 9;
  repeated string tags = 10;
  int32 current_version = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

enum DatasetFormat {
  DATASET_FORMAT_UNSPECIFIED = 0;
  DATASET_FORMAT_PARQUET = 1;
  DATASET_FORMAT_CSV = 2;
  DATASET_FORMAT_JSON = 3;
}

message CreateDatasetRequest {
  string name = 1;
  string description = 2;
  DatasetFormat format = 3;
  repeated string tags = 4;
}

message GetDatasetRequest {
  open_foundry.common.Uuid id = 1;
}

message ListDatasetsRequest {
  open_foundry.common.PageRequest pagination = 1;
  string search = 2;
  repeated string tags = 3;
}

message ListDatasetsResponse {
  repeated Dataset datasets = 1;
  open_foundry.common.PageResponse pagination = 2;
}

message UpdateDatasetRequest {
  open_foundry.common.Uuid id = 1;
  optional string name = 2;
  optional string description = 3;
  repeated string tags = 4;
}

message DeleteDatasetRequest {
  open_foundry.common.Uuid id = 1;
}

message DeleteDatasetResponse {}

message PreviewDataRequest {
  open_foundry.common.Uuid dataset_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message PreviewDataResponse {
  repeated Column columns = 1;
  repeated Row rows = 2;
  int64 total_rows = 3;
}

message Column {
  string name = 1;
  string data_type = 2;
}

message Row {
  map<string, string> values = 1;
}

message DatasetVersion {
  int32 version = 1;
  string message = 2;
  int64 size_bytes = 3;
  int64 row_count = 4;
  google.protobuf.Timestamp created_at = 5;
}

message GetVersionsRequest {
  open_foundry.common.Uuid dataset_id = 1;
}

message GetVersionsResponse {
  repeated DatasetVersion versions = 1;
}
